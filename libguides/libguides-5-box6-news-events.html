<!-- ═══════════════════════════════════════════════════════════════
     BOX 6: News & Events
     Settings: Floating Box ✓
     Full-bleed: content wrapped in .s-lg-box-wrapper-hero
     ═══════════════════════════════════════════════════════════════ -->
<div class="s-lg-box-wrapper-hero">
<!-- ── NEWS & EVENTS ──────────────────────────────────────────── -->
    <section class="section" aria-labelledby="news-heading">
      <div class="container">
        <div class="section-header">
          <p class="section-eyebrow" style="color:var(--csp-navy-60)">Stay connected</p>
          <h2 class="section-title" style="color:var(--csp-navy)" id="news-heading">News &amp; Events</h2>
        </div>
        <div class="news-events-grid">

          <div class="ne-card">
            <div class="ne-card-header">
              <h3 class="ne-card-title">Library News &amp; Updates</h3>
              <a class="ne-card-link" href="https://library.csp.edu/blog">
                All posts <i class="bi bi-arrow-right" aria-hidden="true"></i>
              </a>
            </div>
            <div class="ne-card-body">
              <!-- LibGuides blog box renders here in production -->
              <div class="ne-placeholder">
                <i class="bi bi-megaphone" aria-hidden="true"></i>
                <p>Latest news from the library appears here.<br>
                  <code>s-lib-box: Blog / Recent Posts</code></p>
              </div>
            </div>
          </div>

          <div class="ne-card">
            <div class="ne-card-header">
              <h3 class="ne-card-title">Upcoming Events</h3>
              <a class="ne-card-link" href="https://csp.libcal.com/calendar/library" target="_blank" rel="noopener">
                View all <i class="bi bi-arrow-right" aria-hidden="true"></i>
              </a>
            </div>
            <div class="ne-card-body">
              <!-- LibCal event widget renders here in production -->
              <div class="ne-placeholder">
                <i class="bi bi-calendar-event" aria-hidden="true"></i>
                <p>Upcoming library events appear here.<br>
                  <code>LibCal events widget</code></p>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
</div><!-- /s-lg-box-wrapper-hero -->
